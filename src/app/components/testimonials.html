<!-- TODO: reemplazar por reseñas reales de alumnos (estas son de ejemplo) -->
<section class="mx-auto max-w-[1400px] px-4 py-14 md:px-8 md:py-20 lg:py-28">
  <h2 class="max-w-[24ch] font-display text-3xl tracking-tight md:text-4xl lg:text-5xl" appReveal>
    Alumnos que ya cosen lo que imaginan
  </h2>

  <div class="mt-8 grid grid-cols-1 gap-5 md:mt-12 md:gap-6 lg:grid-cols-12">
    <figure class="flex flex-col justify-between rounded-2xl bg-surface p-6 md:p-8 lg:col-span-6 lg:p-10" appReveal>
      <blockquote class="font-display text-xl leading-snug text-balance md:text-2xl lg:text-3xl">
        “Llegué sin saber enhebrar una aguja y en unas semanas cosí mi primera falda. Las clases se me hacen cortas.”
      </blockquote>
      <figcaption class="mt-6 text-ink-soft">Valentina R., taller de costura desde cero</figcaption>
    </figure>

    <div class="grid gap-5 md:gap-6 lg:col-span-6">
      <figure class="rounded-2xl border border-line p-6 md:p-8" appReveal style="--reveal-delay: 90ms">
        <blockquote class="text-lg leading-relaxed">
          “Mi hija espera toda la semana su clase. Aprende y se divierte muchísimo.”
        </blockquote>
        <figcaption class="mt-4 text-ink-soft">Paola M., mamá de alumna</figcaption>
      </figure>
      <figure class="rounded-2xl border border-line p-6 md:p-8" appReveal style="--reveal-delay: 180ms">
        <blockquote class="text-lg leading-relaxed">
          “Retomé la costura después de muchos años y me trataron con una paciencia increíble. Hoy hago mi propia ropa.”
        </blockquote>
        <figcaption class="mt-4 text-ink-soft">Jorge T., taller para principiantes</figcaption>
      </figure>
    </div>
  </div>
</section>
